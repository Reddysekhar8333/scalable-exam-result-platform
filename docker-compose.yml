version: "3.9"
services:
  # MySQL container for the exam results database
  mysql:
    image: mysql:8.0
    container_name: exam-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
  # Redis container for caching
  redis:
    image: redis:latest
    container_name: exam-redis
    restart: always
    ports:
      - "6379:6379"
  # FastAPI application container
  fastapi:
    build:
      context: ./backend
    container_name: exam-api
    restart: always
    depends_on:
      - mysql
      - redis
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env

volumes:
  mysql_data: